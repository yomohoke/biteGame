<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Bite Rhythm Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  #header {
    display: flex;
    gap: 40px;
    padding: 12px 24px;
    background: rgba(255,255,255,0.05);
    width: 100%;
    justify-content: center;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .stat { text-align: center; }
  .stat-label { font-size: 10px; color: #888; letter-spacing: 2px; }
  .stat-value { font-size: 28px; font-weight: bold; color: #fff; }
  #score-value { color: #00ffaa; }
  #combo-value { color: #ff6b35; }
  #main {
    display: flex;
    gap: 16px;
    padding: 12px;
    flex: 1;
    align-items: flex-start;
    width: 100%;
    max-width: 1000px;
  }
  #game-canvas {
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    background: #0d0d1a;
    flex-shrink: 0;
  }
  #side-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 220px;
    flex-shrink: 0;
  }
  #cam-container {
    position: relative;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    overflow: hidden;
  }
  #webcam {
    width: 220px;
    height: 165px;
    object-fit: cover;
    display: block;
    transform: scaleX(-1);
  }
  #face-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 220px;
    height: 165px;
    transform: scaleX(-1);
  }
  #mouth-meter {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 12px;
  }
  .meter-label { font-size: 10px; color: #888; letter-spacing: 2px; margin-bottom: 6px; }
  #meter-bar-bg {
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    height: 12px;
    overflow: hidden;
  }
  #meter-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00ffaa, #00ccff);
    border-radius: 4px;
    transition: width 0.05s;
  }
  #bite-indicator {
    margin-top: 8px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    color: #ff6b35;
    opacity: 0;
    transition: opacity 0.1s;
    letter-spacing: 2px;
  }
  #instructions {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 12px;
    font-size: 11px;
    color: #888;
    line-height: 1.8;
  }
  #instructions strong { color: #fff; }
  #start-btn {
    background: linear-gradient(135deg, #00ffaa, #00ccff);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 2px;
    width: 100%;
  }
  #start-btn:hover { opacity: 0.85; }
  #judgment-overlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    pointer-events: none;
    opacity: 0;
    text-shadow: 0 0 20px currentColor;
  }
  #status-msg {
    font-size: 11px;
    color: #666;
    text-align: center;
    padding: 4px;
  }
</style>
</head>
<body>

<div id="header">
  <div class="stat">
    <div class="stat-label">SCORE</div>
    <div class="stat-value" id="score-value">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">COMBO</div>
    <div class="stat-value" id="combo-value">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">PERFECT</div>
    <div class="stat-value" id="perfect-value" style="color:#ffdd00">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">MISS</div>
    <div class="stat-value" id="miss-value" style="color:#ff4466">0</div>
  </div>
</div>

<div id="main">
  <canvas id="game-canvas" width="600" height="480"></canvas>

  <div id="side-panel">
    <div id="cam-container">
      <video id="webcam" autoplay muted playsinline></video>
      <canvas id="face-canvas" width="220" height="165"></canvas>
    </div>

    <div id="mouth-meter">
      <div class="meter-label">MOUTH OPEN</div>
      <div id="meter-bar-bg"><div id="meter-bar"></div></div>
      <div id="bite-indicator">BITE!</div>
    </div>

    <div id="instructions">
      <strong>HOW TO PLAY</strong><br>
      ← → で移動<br>
      バーが来たら噛む<br><br>
      <strong>TIMING</strong><br>
      <span style="color:#ffdd00">PERFECT</span> ±50ms<br>
      <span style="color:#00ccff">GOOD</span> ±100ms<br>
      <span style="color:#ff4466">MISS</span> それ以外<br><br>
      <strong>TIP</strong><br>
      スペースキーでも可
    </div>

    <div id="status-msg">カメラ初期化中...</div>
    <button id="start-btn" onclick="startGame()">▶ START</button>
  </div>
</div>

<div id="judgment-overlay"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script>
// ── Audio ─────────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playHitSound(type) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  if (type === 'perfect') {
    o.frequency.value = 880;
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  } else if (type === 'good') {
    o.frequency.value = 660;
    g.gain.setValueAtTime(0.2, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  } else {
    o.frequency.value = 200;
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  }
  o.start(); o.stop(audioCtx.currentTime + 0.3);
}

// ── Canvas & Layout ───────────────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const LANE_COUNT = 4;
const LANE_W = (W - 80) / LANE_COUNT;
const LANE_OFFSET_X = 40;
const JUDGE_Y = H - 100;
const BAR_H = 18;
const BAR_SPEED = 160;       // slower
const PERFECT_WINDOW = 80;
const GOOD_WINDOW = 180;

const COLORS = ['#ff6b6b','#ffd93d','#6bcbff','#a78bfa'];

// ── Pac-Man ───────────────────────────────────────────────────────
let pacLane = 1;             // current lane index
let pacX = 0;                // actual x (animated)
let pacMouthAngle = 0.25;    // mouth opening angle (radians × PI)
let pacMouthDir = 1;
const PAC_R = 26;

function pacTargetX() {
  return LANE_OFFSET_X + pacLane * LANE_W + LANE_W / 2;
}

// ── Beatmap ───────────────────────────────────────────────────────
function generateBeatmap() {
  const bpm = 90;
  const beat = 60000 / bpm;
  const notes = [];
  // sparser: one note per beat with some gaps
  for (let i = 0; i < 20; i++) {
    if (Math.random() < 0.25) continue; // 25% chance to skip a beat
    const t = 2500 + i * beat;
    const lane = Math.floor(Math.random() * LANE_COUNT);
    notes.push({ time: t, lane, hit: false, missed: false });
  }
  notes.sort((a,b) => a.time - b.time);
  return notes;
}

// ── Game State ────────────────────────────────────────────────────
let notes = [];
let startTime = null;
let gameRunning = false;
let score = 0, combo = 0, perfect = 0, miss = 0;
let particles = [];
let judgmentTimer = 0;

// ── Mouth Detection ───────────────────────────────────────────────
let mouthOpenness = 0;
let prevMouthOpenness = 0;
let biteDetected = false;
let biteState = 'open';
const BITE_VELOCITY_THRESHOLD = -0.08; // closing speed per frame to trigger
const BITE_THRESHOLD_OPEN = 0.09;      // must reopen this much to reset

function setupFaceMesh() {
  const videoEl = document.getElementById('webcam');
  const faceCanvas = document.getElementById('face-canvas');
  const faceCtx = faceCanvas.getContext('2d');

  const faceMesh = new FaceMesh({ locateFile: f =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });

  faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  });

  faceMesh.onResults(results => {
    faceCtx.clearRect(0, 0, faceCanvas.width, faceCanvas.height);

    if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
      document.getElementById('status-msg').textContent = '顔が検出されていません';
      return;
    }
    document.getElementById('status-msg').textContent = '顔検出OK ✓';
    const lm = results.multiFaceLandmarks[0];

    const upper = lm[13];
    const lower = lm[14];
    const nose  = lm[1];
    const chin  = lm[152];
    const faceH = Math.abs(chin.y - nose.y) || 0.3;
    prevMouthOpenness = mouthOpenness;
    mouthOpenness = Math.min(1, Math.abs(lower.y - upper.y) / faceH);
    const velocity = mouthOpenness - prevMouthOpenness; // negative = closing

    // Draw overlay dots
    faceCtx.fillStyle = 'rgba(0,255,170,0.7)';
    [13,14,61,291].forEach(i => {
      const p = lm[i];
      faceCtx.beginPath();
      faceCtx.arc(p.x * faceCanvas.width, p.y * faceCanvas.height, 3, 0, Math.PI*2);
      faceCtx.fill();
    });

    // Bite: trigger on closing motion start, reset when reopened
    if (biteState === 'open' && velocity < BITE_VELOCITY_THRESHOLD) {
      biteState = 'closed';
      biteDetected = true;
    } else if (biteState === 'closed' && mouthOpenness > BITE_THRESHOLD_OPEN) {
      biteState = 'open';
    }

    const pct = Math.min(100, mouthOpenness * 600);
    document.getElementById('meter-bar').style.width = pct + '%';
    document.getElementById('bite-indicator').style.opacity = biteState === 'closed' ? '1' : '0';
  });

  const camera = new Camera(videoEl, {
    onFrame: async () => { await faceMesh.send({ image: videoEl }); },
    width: 640, height: 480
  });
  camera.start().then(() => {
    document.getElementById('status-msg').textContent = '顔を画面に映してください';
  }).catch(e => {
    document.getElementById('status-msg').textContent = 'カメラエラー: ' + e.message;
  });
}

// ── Input ─────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'ArrowLeft') {
    pacLane = Math.max(0, pacLane - 1);
  } else if (e.code === 'ArrowRight') {
    pacLane = Math.min(LANE_COUNT - 1, pacLane + 1);
  } else if (e.code === 'KeyA') {
    pacLane = 0;
  } else if (e.code === 'KeyS') {
    pacLane = 1;
  } else if (e.code === 'KeyD') {
    pacLane = 2;
  } else if (e.code === 'KeyF') {
    pacLane = 3;
  } else if (e.code === 'Space' && !e.repeat) {
    biteDetected = true;
    e.preventDefault();
  }
});

// ── Game Logic ────────────────────────────────────────────────────
function startGame() {
  audioCtx.resume();
  notes = generateBeatmap();
  score = 0; combo = 0; perfect = 0; miss = 0;
  particles = [];
  pacLane = 1;
  pacX = pacTargetX();
  updateUI();
  startTime = performance.now();
  gameRunning = true;
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

function processInput(elapsed) {
  if (!gameRunning || !biteDetected) return;
  biteDetected = false;

  // Only check notes in the same lane as pac-man
  let bestNote = null, bestDelta = Infinity;
  for (const note of notes) {
    if (note.hit || note.missed) continue;
    if (note.lane !== pacLane) continue;
    const delta = Math.abs(note.time - elapsed);
    if (delta < GOOD_WINDOW * 2 && delta < bestDelta) {
      bestDelta = delta;
      bestNote = note;
    }
  }

  if (bestNote && bestDelta <= GOOD_WINDOW * 1.5) {
    bestNote.hit = true;
    if (bestDelta <= PERFECT_WINDOW) {
      score += 300 + combo * 10;
      combo++; perfect++;
      showJudgment('PERFECT', '#ffdd00');
      playHitSound('perfect');
      spawnParticles(pacX, JUDGE_Y, '#ffdd00');
    } else {
      score += 100 + combo * 5;
      combo++;
      showJudgment('GOOD', '#00ccff');
      playHitSound('good');
      spawnParticles(pacX, JUDGE_Y, '#00ccff');
    }
  } else {
    combo = 0; miss++;
    showJudgment('MISS', '#ff4466');
    playHitSound('miss');
  }
  updateUI();
}

function showJudgment(text, color) {
  const el = document.getElementById('judgment-overlay');
  el.textContent = text;
  el.style.color = color;
  el.style.opacity = '1';
  judgmentTimer = 700;
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 14; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 80 + Math.random() * 140;
    particles.push({ x, y,
      vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life: 1, color, size: 4 + Math.random()*5 });
  }
}

function updateUI() {
  document.getElementById('score-value').textContent = score;
  document.getElementById('combo-value').textContent = combo;
  document.getElementById('perfect-value').textContent = perfect;
  document.getElementById('miss-value').textContent = miss;
}

// ── Draw ──────────────────────────────────────────────────────────
function drawPacman(x, y, r, mouthOpen, color) {
  const angle = mouthOpen * Math.PI;
  // Body
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.arc(x, y, r, angle, Math.PI * 2 - angle);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  // Eye
  ctx.fillStyle = '#0a0a0f';
  ctx.beginPath();
  ctx.arc(x + r * 0.2, y - r * 0.45, r * 0.12, 0, Math.PI * 2);
  ctx.fill();
}

function roundRect(c, x, y, w, h, r) {
  c.moveTo(x+r, y);
  c.lineTo(x+w-r, y);
  c.quadraticCurveTo(x+w, y, x+w, y+r);
  c.lineTo(x+w, y+h-r);
  c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h);
  c.quadraticCurveTo(x, y+h, x, y+h-r);
  c.lineTo(x, y+r);
  c.quadraticCurveTo(x, y, x+r, y);
}

// ── Loop ──────────────────────────────────────────────────────────
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  if (!gameRunning) return;
  const elapsed = timestamp - startTime;

  // Smooth pac-man movement
  const tx = pacTargetX();
  pacX += (tx - pacX) * Math.min(1, dt * 18);

  // Pac-man mouth animation (idle chomp)
  pacMouthAngle += pacMouthDir * dt * 3;
  if (pacMouthAngle > 0.3) pacMouthDir = -1;
  if (pacMouthAngle < 0.02) pacMouthDir = 1;

  processInput(elapsed);

  // Miss check
  for (const note of notes) {
    if (!note.hit && !note.missed && note.time < elapsed - GOOD_WINDOW * 2) {
      note.missed = true;
      combo = 0; miss++;
      updateUI();
      showJudgment('MISS', '#ff4466');
    }
  }

  // Particles
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 250 * dt;
    p.life -= dt * 1.8;
  }
  particles = particles.filter(p => p.life > 0);

  // Judgment fade
  if (judgmentTimer > 0) {
    judgmentTimer -= dt * 1000;
    document.getElementById('judgment-overlay').style.opacity =
      Math.max(0, judgmentTimer / 700);
  }

  // ── Render ─────────────────────────────────────────────────────
  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Lane backgrounds
  for (let i = 0; i < LANE_COUNT; i++) {
    const lx = LANE_OFFSET_X + i * LANE_W;
    const active = i === pacLane;
    ctx.fillStyle = active ? `${COLORS[i]}18` : `${COLORS[i]}08`;
    ctx.fillRect(lx, 0, LANE_W, H);
    ctx.strokeStyle = active ? `${COLORS[i]}60` : 'rgba(255,255,255,0.06)';
    ctx.lineWidth = active ? 2 : 1;
    ctx.strokeRect(lx, 0, LANE_W, H);
  }

  // Judge line
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 4]);
  ctx.beginPath();
  ctx.moveTo(LANE_OFFSET_X, JUDGE_Y);
  ctx.lineTo(LANE_OFFSET_X + LANE_W * LANE_COUNT, JUDGE_Y);
  ctx.stroke();
  ctx.setLineDash([]);

  // Falling notes
  for (const note of notes) {
    if (note.hit || note.missed) continue;
    const timeToJudge = note.time - elapsed;
    const y = JUDGE_Y - (timeToJudge / 1000) * BAR_SPEED;
    if (y < -BAR_H * 2 || y > H + BAR_H) continue;

    const lx = LANE_OFFSET_X + note.lane * LANE_W + 6;
    const lw = LANE_W - 12;
    const ly = y - BAR_H / 2;

    // approaching glow
    const proximity = Math.max(0, 1 - Math.abs(timeToJudge) / 600);
    ctx.shadowColor = COLORS[note.lane];
    ctx.shadowBlur = 6 + proximity * 20;
    ctx.fillStyle = COLORS[note.lane];
    ctx.beginPath();
    roundRect(ctx, lx, ly, lw, BAR_H, 6);
    ctx.fill();
    ctx.shadowBlur = 0;

    // shine
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    roundRect(ctx, lx+3, ly+3, lw-6, BAR_H*0.35, 3);
    ctx.fill();
  }

  // Pac-man
  const mouthOpen = biteState === 'closed' ? 0.01 : pacMouthAngle;
  drawPacman(pacX, JUDGE_Y, PAC_R, mouthOpen, COLORS[pacLane]);

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Bite flash
  if (biteState === 'closed') {
    ctx.fillStyle = 'rgba(255,107,53,0.04)';
    ctx.fillRect(0, 0, W, H);
  }

  // End check
  if (notes.length > 0 && notes.every(n => n.hit || n.missed) && elapsed > 1000) {
    gameRunning = false;
    setTimeout(showResult, 600);
    return;
  }

  requestAnimationFrame(gameLoop);
}

function showResult() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 40px Courier New';
  ctx.fillText('RESULT', W/2, H/2 - 90);
  ctx.font = '22px Courier New';
  ctx.fillStyle = '#00ffaa';
  ctx.fillText(`SCORE: ${score}`, W/2, H/2 - 35);
  ctx.fillStyle = '#ffdd00';
  ctx.fillText(`PERFECT: ${perfect}`, W/2, H/2 + 10);
  ctx.fillStyle = '#ff4466';
  ctx.fillText(`MISS: ${miss}`, W/2, H/2 + 55);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '14px Courier New';
  ctx.fillText('[ RETRY → START ]', W/2, H/2 + 115);
}

// Initial message
ctx.fillStyle = 'rgba(255,255,255,0.25)';
ctx.font = '16px Courier New';
ctx.textAlign = 'center';
ctx.fillText('← → で移動、噛んでキャッチ', W/2, H/2 - 15);
ctx.font = '12px Courier New';
ctx.fillStyle = 'rgba(255,255,255,0.12)';
ctx.fillText('スペースキーでもテスト可', W/2, H/2 + 20);

window.addEventListener('load', setupFaceMesh);
</script>
</body>
</html>
